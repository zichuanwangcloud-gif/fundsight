<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6fa">
<title>盈见 FundSight</title>
<link rel="stylesheet" href="/theme.css">
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/market.css">
<link rel="stylesheet" href="/indices.css">
<link rel="stylesheet" href="/detail.css">
<link rel="stylesheet" href="/transactions.css">
<link rel="stylesheet" href="/portfolio.css">
<link rel="stylesheet" href="/admin.css">
</head>
<body>
  <!-- 登录 / 注册门控(未登录时覆盖全屏) -->
  <div id="auth">
    <div class="box">
      <h2>盈见 <span class="en">FundSight</span></h2>
      <div class="tip" id="auth-tip">登录后你的自选一直为你保留</div>
      <label>用户名</label>
      <input id="a-user" autocomplete="username" placeholder="用户名">
      <label>密码</label>
      <input id="a-pass" type="password" autocomplete="current-password" placeholder="密码">
      <div class="err" id="auth-err"></div>
      <button class="primary" id="auth-submit" onclick="submitAuth()">登录</button>
      <div class="switch">
        <span id="auth-switch-text">还没有账号？</span>
        <a id="auth-switch" onclick="toggleAuthMode()">注册</a>
      </div>
    </div>
  </div>

  <!-- 吸顶品牌栏:左品牌 / 右用户 -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="logo">盈见</span>
        <span class="en">FundSight</span>
        <span class="slogan">现状 vs 你的预期</span>
      </div>
      <div class="userbar" id="userbar" style="display:none">
        <span class="me">Hi <b id="me-name"></b></span>
        <span id="notif-badge" class="notif-badge" style="display:none" onclick="showNotifs()">🔔<b id="notif-cnt">0</b></span>
        <div id="notif-pop" class="notif-pop" style="display:none"></div>
        <button class="ghost" onclick="logout()">退出</button>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <nav class="tabs">
      <div class="tab" data-key="market" onclick="location.hash='#/market'">市场</div>
      <div class="tab" data-key="portfolio" onclick="location.hash='#/portfolio'">持仓</div>
      <div class="tab" data-key="admin" onclick="location.hash='#/admin'">系统</div>
    </nav>

    <div id="view"></div>
  </div>

  <!-- 通用工具 + 路由(先加载),图表模块,各页脚本随后注册,auth 最后启动 -->
  <script src="/app.js"></script>
  <script src="/chart.js"></script>
  <script src="/indices.js"></script>
  <script src="/portfolio.js"></script>
  <script src="/market.js"></script>
  <script src="/detail.js"></script>
  <script src="/transactions.js"></script>
  <script src="/admin.js"></script>
  <script src="/auth.js"></script>
</body>
</html>
