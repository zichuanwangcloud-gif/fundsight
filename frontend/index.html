<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盈见 FundSight</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #f4f6f9; color: #1f2733; padding: 24px; max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  h1 .en { color: #8a94a6; font-size: 14px; font-weight: normal; }
  .sub { color: #8a94a6; font-size: 13px; margin-bottom: 20px; }
  .search-box { position: relative; margin-bottom: 20px; }
  #q { width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid #d6dbe4;
       border-radius: 10px; outline: none; }
  #q:focus { border-color: #3b7cff; }
  #results { position: absolute; top: 48px; left: 0; right: 0; background: #fff;
             border: 1px solid #e2e6ee; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.08);
             z-index: 10; max-height: 320px; overflow-y: auto; display: none; }
  #results div { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f2f6; }
  #results div:hover { background: #f4f8ff; }
  #results .code { color: #8a94a6; font-size: 12px; margin-left: 6px; }
  #results .type { float: right; color: #b0b7c3; font-size: 12px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px;
          box-shadow: 0 1px 3px rgba(0,0,0,.05); border: 2px solid transparent; }
  .summary { background: linear-gradient(135deg, #2b3a5c, #3b7cff); color: #fff;
             border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; display: none; }
  .summary .s-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .summary .s-title { font-size: 14px; font-weight: 600; opacity: .95; }
  .summary .s-refresh { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .summary .s-refresh button { background: rgba(255,255,255,.18); color: #fff; border: none;
             border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
  .summary .s-refresh button:hover { background: rgba(255,255,255,.3); }
  .summary .s-refresh .s-time { opacity: .75; }
  .summary .s-grid { display: flex; gap: 26px; flex-wrap: wrap; }
  .summary .s-grid > div { font-size: 12px; opacity: .85; }
  .summary .s-grid b { display: block; font-size: 19px; font-weight: 700; opacity: 1; margin-top: 3px; }
  .summary .s-up { color: #ffd0cc; } .summary .s-down { color: #b9f6c8; } .summary .s-flat { color: #fff; }
  .summary .s-note { margin-top: 10px; font-size: 11px; opacity: .7; }
  .card.hit-profit { border-color: #f0b429; box-shadow: 0 0 0 2px rgba(240,180,41,.25), 0 1px 3px rgba(0,0,0,.05); }
  .card.hit-loss { border-color: #e0483d; box-shadow: 0 0 0 2px rgba(224,72,61,.2), 0 1px 3px rgba(0,0,0,.05); }
  .card .top { display: flex; justify-content: space-between; align-items: baseline; }
  .card .fname { font-size: 15px; font-weight: 600; }
  .card .fcode { color: #8a94a6; font-size: 12px; }
  .card .zdf { font-size: 20px; font-weight: 700; }
  .up { color: #e0483d; } .down { color: #16a34a; } .flat { color: #8a94a6; }
  .card .metrics { display: flex; gap: 24px; margin-top: 10px; font-size: 13px; color: #55607a; }
  .card .metrics b { display: block; font-size: 15px; color: #1f2733; margin-top: 2px; }
  .card .metrics .tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 5px;
        margin-left: 4px; border-radius: 4px; background: #eef1f6; color: #8a94a6; vertical-align: middle; }
  .card .metrics .tag.nav { background: #e6f0ff; color: #3b7cff; }
  .card .del { float: right; color: #c0c6d0; cursor: pointer; font-size: 13px; }
  .card .edit { float: right; color: #8a94a6; cursor: pointer; font-size: 13px; margin-left: 14px; }
  .card .gztime { color: #b0b7c3; font-size: 11px; margin-top: 8px; }
  .card .gztime .stale { color: #e0a020; }
  .card .spark { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
  .card .spark .spark-lbl { font-size: 11px; font-weight: 600; }
  .badges { margin-top: 8px; display: flex; gap: 8px; }
  .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .badge.profit { background: #fdf1d6; color: #a3720a; }
  .badge.loss { background: #fde3e1; color: #b8342a; }
  .empty { text-align: center; color: #a0a8b8; padding: 40px 0; }
  dialog { border: none; border-radius: 14px; padding: 22px; width: 320px; box-shadow: 0 12px 40px rgba(0,0,0,.2); }
  dialog h3 { margin-bottom: 14px; font-size: 16px; }
  dialog label { display: block; font-size: 13px; color: #55607a; margin: 10px 0 4px; }
  dialog input { width: 100%; padding: 8px 10px; border: 1px solid #d6dbe4; border-radius: 8px; font-size: 14px; }
  dialog .btns { margin-top: 18px; display: flex; gap: 10px; }
  dialog button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .primary { background: #3b7cff; color: #fff; } .ghost { background: #eef1f6; color: #55607a; }
  /* 登录/注册门控 */
  #auth { position: fixed; inset: 0; background: #f4f6f9; display: none;
          align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  #auth .box { background: #fff; border-radius: 14px; padding: 28px 24px; width: 340px;
               box-shadow: 0 12px 40px rgba(0,0,0,.1); }
  #auth h2 { font-size: 20px; margin-bottom: 4px; }
  #auth .en { color: #8a94a6; font-size: 13px; font-weight: normal; }
  #auth .tip { color: #8a94a6; font-size: 13px; margin: 6px 0 18px; }
  #auth label { display: block; font-size: 13px; color: #55607a; margin: 12px 0 4px; }
  #auth input { width: 100%; padding: 10px 12px; border: 1px solid #d6dbe4;
                border-radius: 8px; font-size: 14px; }
  #auth input:focus { border-color: #3b7cff; outline: none; }
  #auth .err { color: #e0483d; font-size: 13px; min-height: 18px; margin-top: 10px; }
  #auth button.primary { width: 100%; margin-top: 16px; padding: 11px; border: none;
                         border-radius: 8px; font-size: 15px; cursor: pointer; }
  #auth .switch { text-align: center; margin-top: 14px; font-size: 13px; color: #55607a; }
  #auth .switch a { color: #3b7cff; cursor: pointer; }
  .userbar { display: flex; justify-content: flex-end; align-items: center; gap: 10px;
             font-size: 13px; color: #8a94a6; margin-bottom: 10px; }
  .userbar b { color: #1f2733; }
  .userbar button { background: #eef1f6; color: #55607a; border: none; border-radius: 8px;
                    padding: 5px 12px; font-size: 12px; cursor: pointer; }

</style>
</head>
<body>
  <div id="auth">
    <div class="box">
      <h2>盈见 <span class="en">FundSight</span></h2>
      <div class="tip" id="auth-tip">登录后你的自选一直为你保留</div>
      <label>用户名</label>
      <input id="a-user" autocomplete="username" placeholder="用户名">
      <label>密码</label>
      <input id="a-pass" type="password" autocomplete="current-password" placeholder="密码">
      <div class="err" id="auth-err"></div>
      <button class="primary" id="auth-submit" onclick="submitAuth()">登录</button>
      <div class="switch">
        <span id="auth-switch-text">还没有账号？</span>
        <a id="auth-switch" onclick="toggleAuthMode()">注册</a>
      </div>
    </div>
  </div>

  <div class="userbar" id="userbar" style="display:none">
    <span>当前用户 <b id="me-name"></b></span>
    <button onclick="logout()">退出</button>
  </div>

  <h1>盈见 <span class="en">FundSight</span></h1>
  <div class="sub">预见收益 · 搜索基金 → 加自选 → 看涨幅与盈亏</div>

  <div class="search-box">
    <input id="q" placeholder="搜索基金：代码 / 名称 / 拼音（如 020608、机器人、jqr）" autocomplete="off">
    <div id="results"></div>
  </div>

  <div id="summary" class="summary"></div>
  <div id="list"></div>

  <dialog id="dlg">
    <h3 id="dlg-title">添加自选</h3>
    <input type="hidden" id="d-code">
    <label>持仓金额（元，可留空）</label>
    <input id="d-hold" type="number" step="0.01" placeholder="如 10000">
    <label>买入成本（元，可留空）</label>
    <input id="d-cost" type="number" step="0.01" placeholder="如 8500">
    <label>目标净值（预期，可留空）</label>
    <input id="d-target" type="number" step="0.0001" placeholder="如 1.80">
    <label>目标收益率 %（可留空）</label>
    <input id="d-target-rate" type="number" step="0.01" placeholder="如 15">
    <label>止盈线 %（达到即提醒，可留空）</label>
    <input id="d-profit" type="number" step="0.01" placeholder="如 10">
    <label>止损线 %（跌破即提醒，通常为负，可留空）</label>
    <input id="d-loss" type="number" step="0.01" placeholder="如 -8">
    <div class="btns">
      <button class="ghost" onclick="dlg.close()">取消</button>
      <button class="primary" onclick="submitHolding()">加入自选</button>
    </div>
  </dialog>

<script>
const $ = s => document.querySelector(s);
const q = $("#q"), results = $("#results"), dlg = $("#dlg");
let timer = null;
let editingId = null;   // null=新增，非空=编辑该持仓 id
let authMode = "login"; // login | register

// ---- 登录 / 注册门控 ----
function showAuth() {
  $("#userbar").style.display = "none";
  $("#auth").style.display = "flex";
  $("#auth-err").textContent = "";
  $("#a-pass").value = "";
}
function hideAuth(username) {
  $("#auth").style.display = "none";
  $("#userbar").style.display = "flex";
  $("#me-name").textContent = username;
}
function toggleAuthMode() {
  authMode = authMode === "login" ? "register" : "login";
  const login = authMode === "login";
  $("#auth-submit").textContent = login ? "登录" : "注册";
  $("#auth-switch-text").textContent = login ? "还没有账号？" : "已有账号？";
  $("#auth-switch").textContent = login ? "注册" : "登录";
  $("#a-pass").setAttribute("autocomplete", login ? "current-password" : "new-password");
  $("#auth-err").textContent = "";
}
async function submitAuth() {
  const username = $("#a-user").value.trim();
  const password = $("#a-pass").value;
  if (!username || !password) { $("#auth-err").textContent = "请输入用户名和密码"; return; }
  const url = authMode === "login" ? "/api/login" : "/api/register";
  const r = await fetch(url, {
    method: "POST", headers: {"Content-Type": "application/json"},
    credentials: "same-origin", body: JSON.stringify({username, password}),
  });
  if (!r.ok) {
    const d = await r.json().catch(() => ({}));
    $("#auth-err").textContent = d.error || "操作失败";
    return;
  }
  const d = await r.json();
  hideAuth(d.username);
  load();
}
async function logout() {
  await fetch("/api/logout", {method: "POST", credentials: "same-origin"});
  showAuth();
}
$("#a-pass") && $("#a-pass").addEventListener("keydown", e => { if (e.key === "Enter") submitAuth(); });

q.addEventListener("input", () => {
  clearTimeout(timer);
  const v = q.value.trim();
  if (!v) { results.style.display = "none"; return; }
  timer = setTimeout(async () => {
    const r = await fetch("/api/search?q=" + encodeURIComponent(v), {credentials: "same-origin"});
    if (r.status === 401) return showAuth();
    const funds = await r.json();
    results.innerHTML = funds.map(f =>
      `<div onclick='openDlg(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
         ${f.name}<span class="code">${f.fund_code}</span>
         <span class="type">${f.fund_type||""}</span></div>`).join("")
      || `<div style="color:#a0a8b8">无匹配结果</div>`;
    results.style.display = "block";
  }, 200);
});
document.addEventListener("click", e => {
  if (!e.target.closest(".search-box")) results.style.display = "none";
});

function openDlg(f) {
  results.style.display = "none"; q.value = "";
  editingId = null;
  $("#dlg-title").textContent = "添加自选 · " + f.name;
  $("#d-code").value = f.fund_code;
  $("#d-hold").value = $("#d-cost").value = $("#d-target").value = "";
  $("#d-target-rate").value = $("#d-profit").value = $("#d-loss").value = "";
  dlg.showModal();
}
function editHolding(it) {
  editingId = it.id;
  $("#dlg-title").textContent = "编辑持仓 · " + (it.name || it.fund_code);
  $("#d-code").value = it.fund_code;
  $("#d-hold").value = it.hold_amount ?? "";
  $("#d-cost").value = it.cost_amount ?? "";
  $("#d-target").value = it.target_price ?? "";
  $("#d-target-rate").value = it.target_rate ?? "";
  $("#d-profit").value = it.stop_profit ?? "";
  $("#d-loss").value = it.stop_loss ?? "";
  dlg.showModal();
}
async function submitHolding() {
  const body = JSON.stringify({
    fund_code: $("#d-code").value,
    hold_amount: $("#d-hold").value,
    cost_amount: $("#d-cost").value,
    target_price: $("#d-target").value,
    target_rate: $("#d-target-rate").value,
    stop_profit: $("#d-profit").value,
    stop_loss: $("#d-loss").value,
  });
  const url = editingId ? "/api/holdings/" + editingId : "/api/holdings";
  const method = editingId ? "PUT" : "POST";
  const r = await fetch(url, { method, headers: {"Content-Type":"application/json"},
                              credentials: "same-origin", body });
  if (r.status === 401) { dlg.close(); return showAuth(); }
  editingId = null;
  dlg.close(); load();
}
async function del(id) {
  if (!confirm("移除这只自选？")) return;
  const r = await fetch("/api/holdings/" + id, { method: "DELETE", credentials: "same-origin" });
  if (r.status === 401) return showAuth();
  load();
}

function cls(v) { return v > 0 ? "up" : v < 0 ? "down" : "flat"; }
function scls(v) { return v > 0 ? "s-up" : v < 0 ? "s-down" : "s-flat"; }
function sign(v) { return (v > 0 ? "+" : "") + v; }
// 估值数据是否偏旧:缓存写入时间距今 > 5 分钟则提示（盘中场景）
function staleHint(updatedAt) {
  if (!updatedAt) return "";
  const t = new Date(updatedAt.replace(/-/g, "/")).getTime();
  if (isNaN(t)) return "";
  const mins = (Date.now() - t) / 60000;
  return mins > 5 ? ` · <span class="stale">数据延迟 ${Math.round(mins)} 分钟</span>` : "";
}

function renderSummary(s) {
  const box = $("#summary");
  if (!s || !s.count) { box.style.display = "none"; return; }
  const pl = s.total_today_pl, tot = s.total_pl, rate = s.total_return_rate;
  const now = new Date().toLocaleTimeString("zh-CN", { hour12: false });
  box.innerHTML = `
    <div class="s-head">
      <span class="s-title">组合总览 · ${s.count} 只自选</span>
      <span class="s-refresh">
        <span class="s-time">更新于 ${now}</span>
        <button onclick="load()">🔄 刷新</button>
      </span>
    </div>
    <div class="s-grid">
      <div>总估值市值<b>${s.total_est_value.toLocaleString()}</b></div>
      <div>今日盈亏<b class="${scls(pl)}">${sign(pl)}</b></div>
      ${tot!=null?`<div>累计盈亏<b class="${scls(tot)}">${sign(tot)}</b></div>`:""}
      ${rate!=null?`<div>总收益率<b class="${scls(rate)}">${sign(rate)}%</b></div>`:""}
      ${s.total_real_pl!=null?`<div>收盘真实盈亏<b class="${scls(s.total_real_pl)}">${sign(s.total_real_pl)}</b></div>`:""}
    </div>
    ${tot!=null&&s.matched_count<s.count?`<div class="s-note">累计盈亏与收益率基于 ${s.matched_count} 笔有成本记录</div>`:""}`;
  box.style.display = "block";
}

async function load() {
  const r = await fetch("/api/holdings", {credentials: "same-origin"});
  if (r.status === 401) return showAuth();
  const data = await r.json();
  const items = data.items || [];
  renderSummary(data.summary);
  if (!items.length) { $("#list").innerHTML = `<div class="empty">还没有自选，搜索基金加入吧 👆</div>`; return; }
  $("#list").innerHTML = items.map(it => {
    const z = it.gszzl;
    const pl = it.today_pl;
    const cr = it.cost_return_rate;
    const cardCls = ["card"];
    if (it.hit_stop_profit) cardCls.push("hit-profit");
    if (it.hit_stop_loss) cardCls.push("hit-loss");
    const badges = [];
    if (it.hit_stop_profit) badges.push(`<span class="badge profit">🎯 止盈</span>`);
    if (it.hit_stop_loss) badges.push(`<span class="badge loss">⚠️ 止损</span>`);
    return `<div class="${cardCls.join(" ")}">
      <span class="del" onclick="del(${it.id})">移除 ✕</span>
      <span class="edit" onclick='editHolding(${JSON.stringify(it).replace(/'/g,"&#39;")})'>编辑 ✎</span>
      <div class="top">
        <div><span class="fname">${it.name||it.fund_code}</span>
             <span class="fcode">${it.fund_code}</span></div>
        <div class="zdf ${cls(z)}">${z==null?"—":sign(z)+"%"}</div>
      </div>
      <div class="metrics">
        ${it.hold_amount!=null?`<div>持仓金额<b>${it.hold_amount}</b></div>`:""}
        ${pl!=null?`<div>今日盈亏<span class="tag">估算</span><b class="${cls(pl)}">${sign(pl)}</b></div>`:""}
        ${it.est_value!=null?`<div>估算市值<b>${it.est_value}</b></div>`:""}
        ${cr!=null?`<div>持仓收益率<span class="tag">估算</span><b class="${cls(cr)}">${sign(cr)}%</b></div>`:""}
        ${it.real_pl!=null?`<div>收盘真实盈亏<span class="tag nav">${it.nav_date||"官方"}</span><b class="${cls(it.real_pl)}">${sign(it.real_pl)}</b></div>`:""}
        ${it.real_return_rate!=null?`<div>真实收益率<b class="${cls(it.real_return_rate)}">${sign(it.real_return_rate)}%</b></div>`:""}
        ${it.gap_to_target!=null?`<div>距目标净值<b>${sign(it.gap_to_target)}</b></div>`:""}
      </div>
      <div class="spark" data-code="${it.fund_code}"></div>
      ${badges.length?`<div class="badges">${badges.join("")}</div>`:""}
      <div class="gztime">${it.gztime?("估值时间 "+it.gztime):""}${staleHint(it.quote_updated_at)}</div>
    </div>`;
  }).join("");
  loadSparklines(items);
}

// 把净值序列画成迷你 SVG 折线(零依赖)。points: [{d,v}]
function sparkline(points) {
  if (!points || points.length < 2) return "";
  const W = 130, H = 34, pad = 2;
  const vs = points.map(p => p.v);
  const min = Math.min(...vs), max = Math.max(...vs);
  const span = max - min || 1;
  const n = points.length;
  const xy = points.map((p, i) => {
    const x = pad + (W - 2 * pad) * i / (n - 1);
    const y = pad + (H - 2 * pad) * (1 - (p.v - min) / span);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  // 区间涨跌决定颜色:末点 vs 首点
  const up = points[n - 1].v >= points[0].v;
  const color = up ? "#e0483d" : "#16a34a";
  const pct = (((points[n - 1].v - points[0].v) / points[0].v) * 100).toFixed(1);
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <polyline fill="none" stroke="${color}" stroke-width="1.5"
                points="${xy.join(" ")}" stroke-linejoin="round"/>
    </svg><span class="spark-lbl" style="color:${color}">近${n}日 ${up?"+":""}${pct}%</span>`;
}

// 逐只持仓异步取历史序列并渲染(持仓数通常个位数,并发可控)
async function loadSparklines(items) {
  await Promise.all(items.map(async it => {
    const box = document.querySelector(`.spark[data-code="${it.fund_code}"]`);
    if (!box) return;
    try {
      const r = await fetch("/api/nav_history?code=" + encodeURIComponent(it.fund_code) + "&days=90");
      const d = await r.json();
      const svg = sparkline(d.points);
      if (svg) box.innerHTML = svg; else box.style.display = "none";
    } catch { box.style.display = "none"; }
  }));
}
// 启动：先探测登录态，未登录显示门控，已登录直接加载
(async function init() {
  const r = await fetch("/api/me", {credentials: "same-origin"});
  if (r.status === 401) return showAuth();
  const d = await r.json();
  hideAuth(d.username);
  load();
})();
</script>
</body>
</html>
