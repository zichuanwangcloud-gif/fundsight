<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盈见 FundSight</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="/market.css">
<link rel="stylesheet" href="/detail.css">
</head>
<body>
  <!-- 登录 / 注册门控(未登录时覆盖全屏) -->
  <div id="auth">
    <div class="box">
      <h2>盈见 <span class="en">FundSight</span></h2>
      <div class="tip" id="auth-tip">登录后你的自选一直为你保留</div>
      <label>用户名</label>
      <input id="a-user" autocomplete="username" placeholder="用户名">
      <label>密码</label>
      <input id="a-pass" type="password" autocomplete="current-password" placeholder="密码">
      <div class="err" id="auth-err"></div>
      <button class="primary" id="auth-submit" onclick="submitAuth()">登录</button>
      <div class="switch">
        <span id="auth-switch-text">还没有账号？</span>
        <a id="auth-switch" onclick="toggleAuthMode()">注册</a>
      </div>
    </div>
  </div>

  <div class="userbar" id="userbar" style="display:none">
    <span>当前用户 <b id="me-name"></b></span>
    <button onclick="logout()">退出</button>
  </div>

  <h1>盈见 <span class="en">FundSight</span></h1>
  <div class="sub">预见收益 · 逛基金市场 → 看详情 → 加自选 → 管持仓</div>

  <nav class="tabs">
    <div class="tab" data-key="market" onclick="location.hash='#/market'">基金市场</div>
    <div class="tab" data-key="portfolio" onclick="location.hash='#/portfolio'">我的持仓</div>
  </nav>

  <div id="view"></div>

  <!-- 通用工具 + 路由(先加载),各页脚本随后注册,auth 最后启动 -->
  <script src="/app.js"></script>
  <script src="/portfolio.js"></script>
  <!-- 并行线路脚本挂载锚点(各线路只追加自己一行) -->
  <!-- 线路 A 市场:   <script src="/market.js"></script> -->
  <!-- 线路 B 详情:   <script src="/detail.js"></script> -->
  <!-- 线路 C 交易流水: <script src="/transactions.js"></script> -->
  <script src="/market.js"></script>
  <script src="/detail.js"></script>
  <script src="/auth.js"></script>
</body>
</html>
