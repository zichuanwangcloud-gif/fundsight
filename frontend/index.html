<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盈见 FundSight</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #f4f6f9; color: #1f2733; padding: 24px; max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  h1 .en { color: #8a94a6; font-size: 14px; font-weight: normal; }
  .sub { color: #8a94a6; font-size: 13px; margin-bottom: 20px; }
  .search-box { position: relative; margin-bottom: 20px; }
  #q { width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid #d6dbe4;
       border-radius: 10px; outline: none; }
  #q:focus { border-color: #3b7cff; }
  #results { position: absolute; top: 48px; left: 0; right: 0; background: #fff;
             border: 1px solid #e2e6ee; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.08);
             z-index: 10; max-height: 320px; overflow-y: auto; display: none; }
  #results div { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f2f6; }
  #results div:hover { background: #f4f8ff; }
  #results .code { color: #8a94a6; font-size: 12px; margin-left: 6px; }
  #results .type { float: right; color: #b0b7c3; font-size: 12px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px;
          box-shadow: 0 1px 3px rgba(0,0,0,.05); border: 2px solid transparent; }
  .card.hit-profit { border-color: #f0b429; box-shadow: 0 0 0 2px rgba(240,180,41,.25), 0 1px 3px rgba(0,0,0,.05); }
  .card.hit-loss { border-color: #e0483d; box-shadow: 0 0 0 2px rgba(224,72,61,.2), 0 1px 3px rgba(0,0,0,.05); }
  .card .top { display: flex; justify-content: space-between; align-items: baseline; }
  .card .fname { font-size: 15px; font-weight: 600; }
  .card .fcode { color: #8a94a6; font-size: 12px; }
  .card .zdf { font-size: 20px; font-weight: 700; }
  .up { color: #e0483d; } .down { color: #16a34a; } .flat { color: #8a94a6; }
  .card .metrics { display: flex; gap: 24px; margin-top: 10px; font-size: 13px; color: #55607a; }
  .card .metrics b { display: block; font-size: 15px; color: #1f2733; margin-top: 2px; }
  .card .del { float: right; color: #c0c6d0; cursor: pointer; font-size: 13px; }
  .card .gztime { color: #b0b7c3; font-size: 11px; margin-top: 8px; }
  .badges { margin-top: 8px; display: flex; gap: 8px; }
  .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .badge.profit { background: #fdf1d6; color: #a3720a; }
  .badge.loss { background: #fde3e1; color: #b8342a; }
  .empty { text-align: center; color: #a0a8b8; padding: 40px 0; }
  dialog { border: none; border-radius: 14px; padding: 22px; width: 320px; box-shadow: 0 12px 40px rgba(0,0,0,.2); }
  dialog h3 { margin-bottom: 14px; font-size: 16px; }
  dialog label { display: block; font-size: 13px; color: #55607a; margin: 10px 0 4px; }
  dialog input { width: 100%; padding: 8px 10px; border: 1px solid #d6dbe4; border-radius: 8px; font-size: 14px; }
  dialog .btns { margin-top: 18px; display: flex; gap: 10px; }
  dialog button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .primary { background: #3b7cff; color: #fff; } .ghost { background: #eef1f6; color: #55607a; }
</style>
</head>
<body>
  <h1>盈见 <span class="en">FundSight</span></h1>
  <div class="sub">预见收益 · 搜索基金 → 加自选 → 看涨幅与盈亏</div>

  <div class="search-box">
    <input id="q" placeholder="搜索基金：代码 / 名称 / 拼音（如 020608、机器人、jqr）" autocomplete="off">
    <div id="results"></div>
  </div>

  <div id="list"></div>

  <dialog id="dlg">
    <h3 id="dlg-title">添加自选</h3>
    <input type="hidden" id="d-code">
    <label>持仓金额（元，可留空）</label>
    <input id="d-hold" type="number" step="0.01" placeholder="如 10000">
    <label>买入成本（元，可留空）</label>
    <input id="d-cost" type="number" step="0.01" placeholder="如 8500">
    <label>目标净值（预期，可留空）</label>
    <input id="d-target" type="number" step="0.0001" placeholder="如 1.80">
    <div class="btns">
      <button class="ghost" onclick="dlg.close()">取消</button>
      <button class="primary" onclick="submitHolding()">加入自选</button>
    </div>
  </dialog>

<script>
const $ = s => document.querySelector(s);
const q = $("#q"), results = $("#results"), dlg = $("#dlg");
let timer = null;

q.addEventListener("input", () => {
  clearTimeout(timer);
  const v = q.value.trim();
  if (!v) { results.style.display = "none"; return; }
  timer = setTimeout(async () => {
    const r = await fetch("/api/search?q=" + encodeURIComponent(v));
    const funds = await r.json();
    results.innerHTML = funds.map(f =>
      `<div onclick='openDlg(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
         ${f.name}<span class="code">${f.fund_code}</span>
         <span class="type">${f.fund_type||""}</span></div>`).join("")
      || `<div style="color:#a0a8b8">无匹配结果</div>`;
    results.style.display = "block";
  }, 200);
});
document.addEventListener("click", e => {
  if (!e.target.closest(".search-box")) results.style.display = "none";
});

function openDlg(f) {
  results.style.display = "none"; q.value = "";
  $("#dlg-title").textContent = "添加自选 · " + f.name;
  $("#d-code").value = f.fund_code;
  $("#d-hold").value = $("#d-cost").value = $("#d-target").value = "";
  dlg.showModal();
}
async function submitHolding() {
  await fetch("/api/holdings", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      fund_code: $("#d-code").value,
      hold_amount: $("#d-hold").value,
      cost_amount: $("#d-cost").value,
      target_price: $("#d-target").value,
    })
  });
  dlg.close(); load();
}
async function del(id) {
  if (!confirm("移除这只自选？")) return;
  await fetch("/api/holdings/" + id, { method: "DELETE" }); load();
}

function cls(v) { return v > 0 ? "up" : v < 0 ? "down" : "flat"; }
function sign(v) { return (v > 0 ? "+" : "") + v; }

async function load() {
  const r = await fetch("/api/holdings");
  const items = await r.json();
  if (!items.length) { $("#list").innerHTML = `<div class="empty">还没有自选，搜索基金加入吧 👆</div>`; return; }
  $("#list").innerHTML = items.map(it => {
    const z = it.gszzl;
    const pl = it.today_pl;
    const cr = it.cost_return_rate;
    const cardCls = ["card"];
    if (it.hit_stop_profit) cardCls.push("hit-profit");
    if (it.hit_stop_loss) cardCls.push("hit-loss");
    const badges = [];
    if (it.hit_stop_profit) badges.push(`<span class="badge profit">🎯 止盈</span>`);
    if (it.hit_stop_loss) badges.push(`<span class="badge loss">⚠️ 止损</span>`);
    return `<div class="${cardCls.join(" ")}">
      <span class="del" onclick="del(${it.id})">移除 ✕</span>
      <div class="top">
        <div><span class="fname">${it.name||it.fund_code}</span>
             <span class="fcode">${it.fund_code}</span></div>
        <div class="zdf ${cls(z)}">${z==null?"—":sign(z)+"%"}</div>
      </div>
      <div class="metrics">
        ${it.hold_amount!=null?`<div>持仓金额<b>${it.hold_amount}</b></div>`:""}
        ${pl!=null?`<div>今日盈亏<b class="${cls(pl)}">${sign(pl)}</b></div>`:""}
        ${it.est_value!=null?`<div>估算市值<b>${it.est_value}</b></div>`:""}
        ${cr!=null?`<div>持仓收益率<b class="${cls(cr)}">${sign(cr)}%</b></div>`:""}
        ${it.gap_to_target!=null?`<div>距目标净值<b>${sign(it.gap_to_target)}</b></div>`:""}
      </div>
      ${badges.length?`<div class="badges">${badges.join("")}</div>`:""}
      <div class="gztime">${it.gztime?("估值时间 "+it.gztime):""}</div>
    </div>`;
  }).join("");
}
load();
</script>
</body>
</html>
