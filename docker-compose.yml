# 盈见 FundSight —— 一键常驻部署
#
#   docker compose up -d --build     启动(后台常驻,崩溃自愈)
#   docker compose logs -f           看日志(含全量同步进度)
#   docker compose down              停止(data/ 卷保留,自选持仓不丢)
#
# 启动后浏览器访问 http://<本机IP>:8000
services:
  fundsight:
    build: .
    container_name: fundsight
    ports:
      - "8000:8000"
    volumes:
      # SQLite 库持久化到宿主机 data/,容器重建不丢数据
      - ./data:/app/data
    environment:
      - PORT=8000
      - TZ=Asia/Shanghai
    restart: unless-stopped
